<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <!-- এই মেটা ট্যাগটি ০ সেকেন্ডে মেইন ডোমেইনে রিডাইরেক্ট করবে -->
    <meta http-equiv="refresh" content="0; url=https://jacklyn.site">
    <title>Redirecting...</title>
    
    <script>
        // জাভাস্ক্রিপ্ট ব্যাকআপ (যাতে আরও দ্রুত এবং ১০০% নিশ্চিত রিডাইরেক্ট হয়)
        window.location.replace("https://jacklyn.site" + window.location.pathname + window.location.search);
    </script>
</head>
<body>
    <p>যদি অটোমেটিক রিডাইরেক্ট না হয়, তবে <a href="https://jacklyn.site">এখানে ক্লিক করুন</a>।</p>
</body>
</html>
